apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
  namespace: prod-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: my-app
          image: samjean50/my-app:3a4565970c7d18abce137932adc1c76e9d0f6f73
          ports:
            - containerPort: 80