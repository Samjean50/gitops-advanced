apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
  namespace: prod-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: my-app
          image: your-dockerhub-username/my-app:latest
          ports:
            - containerPort: 80